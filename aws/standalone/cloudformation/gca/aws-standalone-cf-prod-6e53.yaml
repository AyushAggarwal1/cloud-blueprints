AWSTemplateFormatVersion: '2010-09-09'
Description: Deploy CNAPPOrgSecurityAuditor role in a single AWS account

Parameters:
  ExternalId:
    Type: String
    Description: External ID for role assumption security
    NoEcho: true
    MinLength: 2
    MaxLength: 1224

Resources:
  CNAPPOrgSecurityAuditor:
    Type: AWS::IAM::Role
    Properties:
      Path: /
      RoleName: CNAPPOrgSecurityAuditor
      Description: CNAPPOrgSecurityAuditor
      MaxSessionDuration: 43200

      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: arn:aws:iam::413297632188:user/cnapp-security-audit-ak
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SecurityAudit

      Policies:
        - PolicyName: Policy-1
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: Policy-1-1
