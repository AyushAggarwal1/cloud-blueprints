AWSTemplateFormatVersion: 2010-09-09
Description: Deploys CNAPPOrgSecurityAuditorRole in management account AND all member accounts / selected OUs

Parameters:
  OrganizationalUnitIds:
    Type: CommaDelimitedList
    Description: "List of Organizational Unit IDs."

  Regions:
    Type: String
    Description: "Comma-separated list of AWS regions where the StackSet should be deployed."
    Default: "us-east-1,us-west-1,us-west-2,us-east-2,ca-central-1,eu-west-1,eu-central-1,eu-west-2,eu-west-3,eu-north-1,ap-south-1,ap-northeast-1,ap-northeast-2,ap-southeast-1,ap-southeast-2,sa-east-1,af-south-1,me-south-1,eu-south-1,ap-east-1"

  AutoDeploy:
    Type: String
    Description: Automatically deploy stack set to new accounts
    Default: "true"

  ExternalId:
    Type: String
    Description: "External ID for role assumption security"
    NoEcho: true
    MinLength: 2
    MaxLength: 1224

  AccountFilterType:
    Type: String
    Default: "NONE"
    AllowedValues:
      - NONE
      - INCLUDE
      - EXCLUDE
    Description: "Use INCLUDE to target only the provided AccountIds within the selected OUs; EXCLUDE to remove those AccountIds from the selected OUs; NONE to ignore AccountIds."

  AccountIds:
    Type: CommaDelimitedList
    Default: ""
    Description: "Comma-delimited AWS account IDs used with AccountFilterType."

  EnableCloudScanning:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: "Deploy cloud scanning IAM role and StackSet resources."

  EnableScpSupport:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Deploy AWS SCP support resources in the management account during onboarding."

  ScpAlertsTenantId:
    Type: String
    Default: ""
    Description: "Tenant id included in SCP alert payloads."

  ScpAwsOrganizationId:
    Type: String
    Default: ""
    AllowedPattern: "^$|^o-[a-z0-9]{10,32}$"
    ConstraintDescription: "Leave empty when SCP support is disabled, or provide a valid AWS Organizations ID, for example o-xxxxxxxxxx."
    Description: "AWS Organization ID allowed to send member-account SCP alert events to the management account event bus. Required only when EnableScpSupport is true."

  RootOrganizationalUnitId:
    Type: String
    Default: ""
    AllowedPattern: "^$|^r-[a-z0-9]{4,32}$"
    ConstraintDescription: "Leave empty when SCP support is disabled, or provide a valid AWS Organizations root ID, for example r-xxxx."
    Description: "AWS Organizations root ID used to deploy SCP alert forwarders. Required only when EnableScpSupport is true."

Conditions:
  CloudScanningEnabled: !Equals [!Ref EnableCloudScanning, "true"]
  HasAccountIds: !Not [!Equals [!Join [",", !Ref AccountIds], ""]]
  HasRootOrganizationalUnitId: !Not [!Equals [!Ref RootOrganizationalUnitId, ""]]
  UseInclude: !Equals [!Ref AccountFilterType, "INCLUDE"]
  UseExclude: !Equals [!Ref AccountFilterType, "EXCLUDE"]
  AutoDeployEnabled: !Equals [!Ref AutoDeploy, "true"]
  CreateScpSupportStack: !Equals [!Ref EnableScpSupport, "true"]

Resources:
  ManagementAccountRole:
    Type: AWS::IAM::Role
    Condition: CloudScanningEnabled
    Properties:
      Path: "/"
      RoleName: "CNAPPOrgSecurityAuditor"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: arn:aws:iam::956994857092:user/cnapp-security-audit-ak
            Action: "sts:AssumeRole"
            Condition:
              StringEquals:
                "sts:ExternalId": !Ref ExternalId
      Description: "CNAPPOrgSecurityAuditor (Management Account)"
      MaxSessionDuration: 43200
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/ReadOnlyAccess"
        - "arn:aws:iam::aws:policy/SecurityAudit"
      Policies:
        - PolicyName: "AI-ML-permissions"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: "AllowAIMLServices"
                Effect: Allow
                Action:
                  - "bedrock:InvokeModel"
                  - "bedrock:ListImportedModels"
                  - "bedrock:ListModelInvocationJobs"
                  - "sagemaker:InvokeEndpoint"
                  - "aws-marketplace:Subscribe"
                  - "aws-marketplace:ViewSubscriptions"
                Resource: "*"

  StackSet:
    Type: AWS::CloudFormation::StackSet
    Condition: CloudScanningEnabled
    Properties:
      AutoDeployment:
        Enabled: !Ref AutoDeploy
        # Only include RetainStacksOnAccountRemoval when AutoDeploy is true
        RetainStacksOnAccountRemoval:
          !If [AutoDeployEnabled, false, !Ref "AWS::NoValue"]
      PermissionModel: SERVICE_MANAGED
      Capabilities:
        - CAPABILITY_NAMED_IAM
      Description: Deploys CNAPPOrgSecurityAuditorRole across member accounts
      Parameters:
        - ParameterKey: ExternalId
          ParameterValue: !Ref ExternalId
      OperationPreferences:
        FailureTolerancePercentage: 99
        MaxConcurrentPercentage: 100
        RegionConcurrencyType: PARALLEL
      StackInstancesGroup:
        - DeploymentTargets:
            AccountFilterType:
              !If [
                HasAccountIds,
                !If [
                  UseExclude,
                  DIFFERENCE,
                  !If [UseInclude, INTERSECTION, NONE],
                ],
                NONE,
              ]
            OrganizationalUnitIds: !Ref OrganizationalUnitIds
            Accounts: !If [HasAccountIds, !Ref AccountIds, !Ref "AWS::NoValue"]
          Regions:
            - !Select
              - 0
              - !Split
                - ","
                - !Ref Regions
      StackSetName: "AK-SecurityAuditorRoleStackSet"
      TemplateBody: !Sub |
        {
          "AWSTemplateFormatVersion": "2010-09-09",
          "Parameters": {
            "ExternalId": {
              "Type": "String",
              "Description": "External ID for role assumption security",
              "NoEcho": true,
              "MinLength": 2,
              "MaxLength": 1224
            }
          },
          "Resources": {
            "CNAPPOrgSecurityAuditor": {
              "Type": "AWS::IAM::Role",
              "Properties": {
                "Path": "/",
                "RoleName": "CNAPPOrgSecurityAuditor",
                "AssumeRolePolicyDocument": {
                  "Version": "2012-10-17",
                  "Statement": [
                    {
                      "Effect": "Allow",
                      "Principal": {
                        "AWS": "arn:aws:iam::956994857092:user/cnapp-security-audit-ak"
                      },
                      "Action": "sts:AssumeRole",
                      "Condition": {
                        "StringEquals": {
                          "sts:ExternalId": {"Ref": "ExternalId"}
                        }
                      }
                    }
                  ]
                },
                "Description": "CNAPPOrgSecurityAuditor",
                "MaxSessionDuration": 43200,
                "ManagedPolicyArns": [
                  "arn:aws:iam::aws:policy/ReadOnlyAccess",
                  "arn:aws:iam::aws:policy/SecurityAudit"
                ],
                "Policies": [
                  {
                    "PolicyName": "AI-ML-permissions",
                    "PolicyDocument": {
                      "Version": "2012-10-17",
                      "Statement": [
                        {
                          "Sid": "AllowAIMLServices",
                          "Effect": "Allow",
                          "Action": [
                            "bedrock:InvokeModel",
                            "bedrock:ListImportedModels",
                            "bedrock:ListModelInvocationJobs",
                            "sagemaker:InvokeEndpoint",
                            "aws-marketplace:Subscribe",
                            "aws-marketplace:ViewSubscriptions"
                          ],
                          "Resource": "*"
                        }
                      ]
                    }
                  }
                ]
              }
            }
          }
        }

  ScpSupportStack:
    Type: AWS::CloudFormation::Stack
    Condition: CreateScpSupportStack
    Properties:
      TemplateURL: !Sub https://cloud-security-cnapp-${AWS::Region}.s3.${AWS::Region}.amazonaws.com/aws-scp-support/aws-scp-support.yaml
      TimeoutInMinutes: 30
      Parameters:
        ProjectName: aws-scp-support
        ResourceNameSuffix: !Select [0, !Split ["-", !Select [2, !Split ["/", !Ref "AWS::StackId"]]]]
        ApiStageName: dev
        EnableJwtAuthorizer: "true"
        EnforcementLambdaS3Bucket: !Sub cloud-security-cnapp-${AWS::Region}
        EnforcementLambdaS3Key: aws-scp-support/enforcement-lambda.zip
        AuthorizerLambdaS3Bucket: !Sub cloud-security-cnapp-${AWS::Region}
        AuthorizerLambdaS3Key: aws-scp-support/authorizer-lambda.zip
        ScpDetectorLambdaS3Bucket: !Sub cloud-security-cnapp-${AWS::Region}
        ScpDetectorLambdaS3Key: aws-scp-support/scp-detector-lambda.zip
        ScpAlertsWebhookUrl: https://cwpp.dev.accuknox.com/aws/alerts
        ScpAlertsTenantId: !Ref ScpAlertsTenantId
        ScpAlertAllowedPrincipalOrgId: !Ref ScpAwsOrganizationId
        JwtJwksUrl: https://cspm.dev.accuknox.com/api/v1/jwks/
        JwtExpectedIssuer: cspm.dev.accuknox.com
        CreateScpAlertCloudTrail: "true"
        ScpAlertCloudTrailLogRetentionDays: 1
        ScpComponentName: cloud-governance

  ScpAlertForwarderStackSet:
    Type: AWS::CloudFormation::StackSet
    Condition: CreateScpSupportStack
    DependsOn: ScpSupportStack
    Properties:
      AutoDeployment:
        Enabled: !Ref AutoDeploy
        RetainStacksOnAccountRemoval:
          !If [AutoDeployEnabled, false, !Ref "AWS::NoValue"]
      PermissionModel: SERVICE_MANAGED
      Capabilities:
        - CAPABILITY_NAMED_IAM
      Description: Forwards member-account authorization failure CloudTrail events to the management account SCP alert event bus.
      Parameters:
        - ParameterKey: CentralEventBusArn
          ParameterValue: !GetAtt ScpSupportStack.Outputs.ScpAlertEventBusArn
      OperationPreferences:
        FailureTolerancePercentage: 99
        MaxConcurrentPercentage: 100
        RegionConcurrencyType: PARALLEL
      StackInstancesGroup:
        - DeploymentTargets:
            AccountFilterType:
              !If [
                HasAccountIds,
                !If [
                  UseExclude,
                  DIFFERENCE,
                  !If [UseInclude, INTERSECTION, NONE],
                ],
                NONE,
              ]
            OrganizationalUnitIds: !If
              - HasRootOrganizationalUnitId
              - - !Ref RootOrganizationalUnitId
              - !Ref OrganizationalUnitIds
            Accounts: !If [HasAccountIds, !Ref AccountIds, !Ref "AWS::NoValue"]
          Regions:
            - !Select
              - 0
              - !Split
                - ","
                - !Ref Regions
      StackSetName: !Sub AK-ScpAlertForwarder-${AWS::StackName}
      TemplateBody: |
        {
          "AWSTemplateFormatVersion": "2010-09-09",
          "Parameters": {
            "CentralEventBusArn": {
              "Type": "String",
              "Description": "Management account EventBridge bus ARN for AWS SCP alert candidates."
            }
          },
          "Resources": {
            "ScpAlertForwarderRole": {
              "Type": "AWS::IAM::Role",
              "Properties": {
                "AssumeRolePolicyDocument": {
                  "Version": "2012-10-17",
                  "Statement": [
                    {
                      "Effect": "Allow",
                      "Principal": {
                        "Service": "events.amazonaws.com"
                      },
                      "Action": "sts:AssumeRole"
                    }
                  ]
                },
                "Policies": [
                  {
                    "PolicyName": "PutScpAlertEvents",
                    "PolicyDocument": {
                      "Version": "2012-10-17",
                      "Statement": [
                        {
                          "Effect": "Allow",
                          "Action": "events:PutEvents",
                          "Resource": {
                            "Ref": "CentralEventBusArn"
                          }
                        }
                      ]
                    }
                  }
                ]
              }
            },
            "ScpAlertForwarderRule": {
              "Type": "AWS::Events::Rule",
              "Properties": {
                "State": "ENABLED",
                "EventPattern": {
                  "detail-type": ["AWS API Call via CloudTrail"],
                  "detail": {
                    "eventType": ["AwsApiCall"],
                    "errorCode": [
                      {
                        "exists": true
                      }
                    ]
                  }
                },
                "Targets": [
                  {
                    "Id": "CentralScpAlertBus",
                    "Arn": {
                      "Ref": "CentralEventBusArn"
                    },
                    "RoleArn": {
                      "Fn::GetAtt": ["ScpAlertForwarderRole", "Arn"]
                    }
                  }
                ]
              }
            }
          }
        }

Outputs:
  ManagementAccountRoleArn:
    Condition: CloudScanningEnabled
    Description: "The ARN of the CNAPPOrgSecurityAuditor role in the management account"
    Value: !GetAtt ManagementAccountRole.Arn

  ScpSupportStackId:
    Condition: CreateScpSupportStack
    Description: "Nested stack id for the AWS SCP support stack."
    Value: !Ref ScpSupportStack

  InvokeUrl:
    Condition: CreateScpSupportStack
    Description: "API Gateway endpoint used by PPS to push SCP policy changes."
    Value: !GetAtt ScpSupportStack.Outputs.InvokeUrl
