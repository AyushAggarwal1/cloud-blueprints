AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AWS SCP support stack: enforcement Lambda, JWT Lambda authorizer, and HTTP
  API Gateway for push-based SCP enforcement.

Parameters:
  ProjectName:
    Type: String
    Default: aws-scp-support
    Description: Prefix used for AWS resource names.

  ResourceNameSuffix:
    Type: String
    Default: test
    AllowedPattern: "[A-Za-z0-9-]+"
    MaxLength: 16
    Description: Short suffix appended to SCP resource names for uniqueness.

  ApiStageName:
    Type: String
    Default: test
    Description: HTTP API stage name.

  EnableJwtAuthorizer:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Set false only for local/sandbox testing without JWT.

  EnforcementLambdaS3Bucket:
    Type: String
    Default: cloud-security-cnapp
    Description: S3 bucket containing enforcement-lambda.zip.

  EnforcementLambdaS3Key:
    Type: String
    Default: aws-scp-support/enforcement-lambda.zip
    Description: S3 key for enforcement-lambda.zip.

  EnforcementLambdaS3ObjectVersion:
    Type: String
    Default: ""
    Description: Optional S3 object version for enforcement-lambda.zip.

  AuthorizerLambdaS3Bucket:
    Type: String
    Default: cloud-security-cnapp
    Description: S3 bucket containing authorizer-lambda.zip.

  AuthorizerLambdaS3Key:
    Type: String
    Default: aws-scp-support/authorizer-lambda.zip
    Description: S3 key for authorizer-lambda.zip.

  AuthorizerLambdaS3ObjectVersion:
    Type: String
    Default: ""
    Description: Optional S3 object version for authorizer-lambda.zip.

  LambdaRuntime:
    Type: String
    Default: python3.12
    AllowedValues: [python3.12]

  EnforcementLambdaMemorySize:
    Type: Number
    Default: 256

  EnforcementLambdaTimeout:
    Type: Number
    Default: 30

  AuthorizerLambdaMemorySize:
    Type: Number
    Default: 256

  AuthorizerLambdaTimeout:
    Type: Number
    Default: 10

  JwtJwksUrl:
    Type: String
    Default: https://cspm.dev.accuknox.com/api/v1/jwks/
    Description: CSPM JWKS URL.

  JwtExpectedIssuer:
    Type: String
    Default: cspm.dev.accuknox.com

  JwtExpectedAudience:
    Type: String
    Default: aws::lambda::scp-policy-enforcement
    Description: Expected aud claim for SCP enforcement API requests.

  JwtExpectedSubject:
    Type: String
    Default: policy-provider-service
    Description: Expected sub claim for SCP enforcement API requests.

  JwtRequiredTokenType:
    Type: String
    Default: access

  JwtRequiredClaims:
    Type: String
    Default: exp,tenant-id
    Description: Comma-separated required JWT claims.

  JwtClockSkewSeconds:
    Type: Number
    Default: 60

Conditions:
  UseJwtAuthorizer: !Equals [!Ref EnableJwtAuthorizer, "true"]
  HasJwtExpectedSubject: !Not [!Equals [!Ref JwtExpectedSubject, ""]]
  HasEnforcementLambdaObjectVersion: !Not [!Equals [!Ref EnforcementLambdaS3ObjectVersion, ""]]
  HasAuthorizerLambdaObjectVersion: !Not [!Equals [!Ref AuthorizerLambdaS3ObjectVersion, ""]]

Resources:
  EnforcementLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${ResourceNameSuffix}-enforcement-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: !Sub OrganizationsScpEnforcement-${ResourceNameSuffix}
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - organizations:CreatePolicy
                  - organizations:UpdatePolicy
                  - organizations:DeletePolicy
                  - organizations:AttachPolicy
                  - organizations:DetachPolicy
                  - organizations:TagResource
                  - organizations:ListPolicies
                  - organizations:ListTargetsForPolicy
                  - organizations:ListTagsForResource
                Resource: "*"

  EnforcementLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-${ResourceNameSuffix}-enforcement
      Runtime: !Ref LambdaRuntime
      Handler: lambda_function.lambda_handler
      Role: !GetAtt EnforcementLambdaRole.Arn
      Code:
        S3Bucket: !Ref EnforcementLambdaS3Bucket
        S3Key: !Ref EnforcementLambdaS3Key
        S3ObjectVersion: !If [HasEnforcementLambdaObjectVersion, !Ref EnforcementLambdaS3ObjectVersion, !Ref AWS::NoValue]
      MemorySize: !Ref EnforcementLambdaMemorySize
      Timeout: !Ref EnforcementLambdaTimeout

  AuthorizerLambdaRole:
    Type: AWS::IAM::Role
    Condition: UseJwtAuthorizer
    Properties:
      RoleName: !Sub ${ProjectName}-${ResourceNameSuffix}-authorizer-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  AuthorizerLambda:
    Type: AWS::Lambda::Function
    Condition: UseJwtAuthorizer
    Properties:
      FunctionName: !Sub ${ProjectName}-${ResourceNameSuffix}-jwt-authorizer
      Runtime: !Ref LambdaRuntime
      Handler: lambda_function.lambda_handler
      Role: !GetAtt AuthorizerLambdaRole.Arn
      Code:
        S3Bucket: !Ref AuthorizerLambdaS3Bucket
        S3Key: !Ref AuthorizerLambdaS3Key
        S3ObjectVersion: !If [HasAuthorizerLambdaObjectVersion, !Ref AuthorizerLambdaS3ObjectVersion, !Ref AWS::NoValue]
      MemorySize: !Ref AuthorizerLambdaMemorySize
      Timeout: !Ref AuthorizerLambdaTimeout
      Environment:
        Variables:
          JWT_JWKS_URL: !Ref JwtJwksUrl
          JWT_EXPECTED_ISSUER: !Ref JwtExpectedIssuer
          JWT_EXPECTED_AUDIENCE: !Ref JwtExpectedAudience
          JWT_EXPECTED_SUBJECT: !If [HasJwtExpectedSubject, !Ref JwtExpectedSubject, ""]
          JWT_REQUIRED_TOKEN_TYPE: !Ref JwtRequiredTokenType
          JWT_REQUIRED_CLAIMS: !Ref JwtRequiredClaims
          JWT_CLOCK_SKEW_SECONDS: !Ref JwtClockSkewSeconds

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${ProjectName}-${ResourceNameSuffix}-api
      ProtocolType: HTTP

  EnforcementIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt EnforcementLambda.Arn
      PayloadFormatVersion: "2.0"
      TimeoutInMillis: 30000

  JwtLambdaAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Condition: UseJwtAuthorizer
    Properties:
      ApiId: !Ref HttpApi
      Name: !Sub cspm-jwt-lambda-authorizer-${ResourceNameSuffix}
      AuthorizerType: REQUEST
      AuthorizerUri: !Sub
        - arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthorizerArn}/invocations
        - AuthorizerArn: !GetAtt AuthorizerLambda.Arn
      IdentitySource:
        - $request.header.Authorization
      AuthorizerPayloadFormatVersion: "2.0"
      EnableSimpleResponses: true
      AuthorizerResultTtlInSeconds: 0

  EnforcementRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /enforce-policy
      Target: !Sub integrations/${EnforcementIntegration}
      AuthorizationType: !If [UseJwtAuthorizer, CUSTOM, NONE]
      AuthorizerId: !If [UseJwtAuthorizer, !Ref JwtLambdaAuthorizer, !Ref AWS::NoValue]

  CheckRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /check
      Target: !Sub integrations/${EnforcementIntegration}
      AuthorizationType: NONE

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: !Ref ApiStageName
      AutoDeploy: true

  EnforcementInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref EnforcementLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/enforce-policy

  CheckInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref EnforcementLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*/*/check

  AuthorizerInvokePermission:
    Type: AWS::Lambda::Permission
    Condition: UseJwtAuthorizer
    Properties:
      FunctionName: !Ref AuthorizerLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/authorizers/*

Outputs:
  EnforcePolicyUrl:
    Description: Full enforce-policy URL.
    Value: !Sub ${HttpApi.ApiEndpoint}/${ApiStageName}/enforce-policy

  CheckUrl:
    Description: Full check URL.
    Value: !Sub ${HttpApi.ApiEndpoint}/${ApiStageName}/check
